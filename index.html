<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathGenius Kids - Luyện Toán Tiểu Học</title>

  <meta property="og:image" content="/OG.png" />
  <meta property="og:url" content="https://zeusato.github.io/Genius-kids/" />
  <!--
    Khôi phục route SPA do 404.html chuyển hướng tới (GitHub Pages).
    Giải mã đường dẫn từ query string "?/path" về lại URL thật trước khi React Router chạy.
    Kỹ thuật theo https://github.com/rafgraph/spa-github-pages
  -->
  <script type="text/javascript">
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location));
  </script>
</head>

<body class="bg-brand-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
